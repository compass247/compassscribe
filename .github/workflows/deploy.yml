name: Deploy

# On every push to main: apply infrastructure (Terraform) FIRST, then deploy
# the frontend (ECR + ECS) and backend Lambda. Infra runs before code so any
# new infra (env vars, DB changes, etc.) is ready before the new code runs.
#
# Required repo settings:
#   Secrets:   AWS_DEPLOY_ROLE_ARN, CLOUDFLARE_API_TOKEN, TF_STATE_BUCKET
#   Variables: AWS_REGION, ECR_REPOSITORY, ECS_CLUSTER, ECS_SERVICE,
#              LEAD_LAMBDA_NAME, API_BASE, CLOUDFLARE_ZONE_ID,
#              CMS_BASE (https://cms.compassagewell.com), SITE_URL
#
# NOTE (Phase 5 cutover): the web container is now Next.js (port 3000). At
# cutover, update the web task definition's containerPort 80->3000, the ALB
# health check path, and inject REVALIDATE_SECRET (server-side, from Secrets
# Manager) so the /api/revalidate webhook works. Until then the existing
# Fargate web service keeps serving the old static image unchanged.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # for OIDC
  contents: read

jobs:
  # ---------------- Infra: terraform apply (runs first) ----------------
  infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # Lambda zips are produced by archive_file from backend/lead-handler and
      # backend/lead-sync, so their production deps must be present before apply.
      - name: Prepare Lambda deps (lead-handler)
        run: npm install --omit=dev --no-audit --no-fund
        working-directory: backend/lead-handler

      - name: Prepare Lambda deps (lead-sync)
        run: npm install --omit=dev --no-audit --no-fund
        working-directory: backend/lead-sync

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=agewell-tf-lock"

      - name: Terraform apply
        run: terraform apply -auto-approve

  # ---------------- Deploy: build image, ECS, Lambda ----------------
  deploy:
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- Frontend: build, push, deploy ----------------
      - name: Build & push web image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
          API_BASE: ${{ vars.API_BASE }}
          CMS_BASE: ${{ vars.CMS_BASE }}
          SITE_URL: ${{ vars.SITE_URL }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPO:$SHA"
          # NEXT_PUBLIC_* are baked at build time (Next inlines them).
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE="$API_BASE" \
            --build-arg NEXT_PUBLIC_CMS_BASE="$CMS_BASE" \
            --build-arg NEXT_PUBLIC_SITE_URL="${SITE_URL:-https://compassagewell.com}" \
            -t "$IMAGE" -t "$REGISTRY/$REPO:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$REPO:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Render new task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_SERVICE }}" \
            --query taskDefinition > taskdef.json
          # Drop fields the register call rejects, then swap in the new image.
          jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' taskdef.json > new-taskdef.json
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query taskDefinition.taskDefinitionArn --output text)
          echo "task_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.taskdef.outputs.task_arn }}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      # ---------------- Backend: package & update Lambda ----------------
      - name: Update lead Lambda
        working-directory: backend/lead-handler
        run: |
          npm install --omit=dev --no-audit --no-fund
          zip -rq ../../lead-handler.zip . -x "build.mjs"
          cd ../..
          aws lambda update-function-code \
            --function-name "${{ vars.LEAD_LAMBDA_NAME }}" \
            --zip-file fileb://lead-handler.zip \
            --query 'LastModified' --output text
