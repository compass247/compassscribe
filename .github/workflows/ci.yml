name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write       # OIDC for terraform plan
  contents: read
  pull-requests: write  # post the plan summary as a PR comment

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t agewell-web:ci .

  # Read-only preview of infra/DB changes on every PR. NEVER applies — this is
  # the "light staging" safety net: review exactly what will change before merge.
  terraform-plan:
    name: Terraform plan (preview)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Prepare Lambda deps (lead-handler)
        run: npm install --omit=dev --no-audit --no-fund
        working-directory: backend/lead-handler

      - name: Prepare Lambda deps (lead-sync)
        run: npm install --omit=dev --no-audit --no-fund
        working-directory: backend/lead-sync

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=agewell-tf-lock"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -no-color -out tf.plan | tee plan.txt
          # Trim to a PR-comment-friendly size.
          {
            echo "plan<<EOF"
            tail -c 60000 plan.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`;
            const body = [
              '### Terraform plan (preview — not applied)',
              '',
              '> Review carefully. Lines with `destroy`/`-/+ replace` on a `aws_dynamodb_table` mean **DATA LOSS**.',
              '',
              '```',
              plan,
              '```',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const marker = '### Terraform plan (preview';
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
