name: Infra (Terraform)

# Manual only — plan or apply infrastructure changes. Never runs on push,
# so app deploys can't accidentally mutate infrastructure.
# Requires repo settings:
#   Secrets:   AWS_DEPLOY_ROLE_ARN (or a broader infra role), CLOUDFLARE_API_TOKEN, TF_STATE_BUCKET
#   Variables: AWS_REGION, CLOUDFLARE_ZONE_ID

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # Lambda zip is produced by archive_file from backend/lead-handler,
      # so its production deps must be present before plan/apply.
      - name: Prepare Lambda deps
        run: npm ci --omit=dev
        working-directory: backend/lead-handler

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=agewell-tf-lock"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out tf.plan

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve tf.plan
